<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MAGICUM | Digital Alchemist Atelier</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="cursor-glow"></div>
<div class="site-badge">⚜️ MAGICUM-SITE ⚜️</div>
<a href="/cabinet" class="cabinet-nav">🔮 КАБІНЕТ</a>

<section class="hero">
  <div class="hero-bg" id="parallaxBg"></div>
  <div class="logo">MAGIC<span>UM</span></div>
  <p style="letter-spacing: 10px; opacity: 0.6; font-size: 0.7rem;">DIGITAL ALCHEMY ATELIER</p>
  <button class="btn-alchemy" onclick="document.getElementById('lab').scrollIntoView({behavior:'smooth'})">ПОЧАТИ РИТУАЛ</button>
  <div style="position: absolute; bottom: 32px; font-size: 0.55rem; letter-spacing: 8px; opacity: 0.3;">SCROLL ↓</div>
</section>

<section id="lab" class="laboratory">
  <div class="cards-container">

    <div class="card" id="card1">
      <div style="font-size: 0.65rem; opacity: 0.5; letter-spacing: 3px; margin-bottom: 20px;">I. ВТІЛЕННЯ ФОРМИ</div>
      <div id="furniturePreview" class="preview-box"><span style="opacity: 0.3;">⬇️ ОЧІКУВАННЯ ФОТО</span></div>
      <button class="btn-alchemy" style="padding: 8px 20px; font-size: 0.7rem;" onclick="document.getElementById('furnitureInput').click()">ЗАВАНТАЖИТИ</button>
      <input type="file" id="furnitureInput" accept="image/jpeg,image/png,image/webp" style="display: none;">
    </div>

    <div class="card" id="card2">
      <div style="font-size: 0.65rem; opacity: 0.5; letter-spacing: 3px; margin-bottom: 14px;">II. ОБРАННЯ ЕСЕНЦІЇ</div>
      <div class="fabric-filters">
        <button class="filter-tab active" data-cat="all">ВСІ</button>
        <button class="filter-tab" data-cat="оксамит">ОКСАМИТ</button>
        <button class="filter-tab" data-cat="льон">ЛЬОН</button>
        <button class="filter-tab" data-cat="шовк">ШОВК</button>
        <button class="filter-tab" data-cat="шкіра">ШКІРА</button>
      </div>
      <div class="fabric-catalog"><div class="fabric-grid" id="fabricGrid"></div></div>
      <p id="selectedFabricLabel" style="font-size: 0.65rem; color: var(--gold); margin-top: 16px; letter-spacing: 1px;">❖ МАТЕРІЯ НЕ ОБРАНА</p>
    </div>

  </div>

  <div class="api-area">
    <button id="generateBtn" class="btn-alchemy" style="width: 100%; margin-top: 36px;">🔮 ПРОЯВИТИ ОБРАЗ</button>
  </div>
  <div id="statusMessage" class="status-msg">⛁ очікування завантажень</div>

  <div id="resultArea" class="result-area">
    <div class="slider-compare" id="sliderCompare">
      <img id="sourceImg" class="slider-img" alt="original">
      <div class="slider-overlay" id="sliderOverlay"><img id="outputImg" alt="result"></div>
      <div class="slider-handle" id="sliderHandle"></div>
    </div>
    <div style="text-align: center; font-size: 0.6rem; margin-top: 12px; opacity: 0.6;">⇠ перетягніть: оригінал ⇢ візуалізація</div>
  </div>

  <div id="saveArea" style="display:none; max-width: 880px; margin: 32px auto 0; padding: 0 20px;">
    <div style="background: var(--dark-card); border: 1px solid var(--border-dim); padding: 28px 24px; border-radius: 4px;">
      <div style="font-size: 0.65rem; letter-spacing: 3px; opacity: 0.5; margin-bottom: 20px;">✦ ЗБЕРЕГТИ КЕЙ</div>
      <div style="display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px;">
        <div style="flex: 1; min-width: 140px;">
          <label style="font-size: 0.6rem; letter-spacing: 2px; opacity: 0.6; display: block; margin-bottom: 8px;">ТИП МЕБЛІВ</label>
          <select id="furnitureTypeInput" style="width:100%;background:#030302;border:1px solid var(--border-dim);color:var(--text-light);padding:10px;font-family:'Jost',sans-serif;font-size:0.75rem;cursor:pointer;">
            <option value="диван">Диван</option>
            <option value="крісло">Крісло</option>
            <option value="пуф">Пуф</option>
            <option value="стілець">Стілець</option>
            <option value="кушетка">Кушетка</option>
            <option value="інше">Інше</option>
          </select>
        </div>
        <div style="flex: 1; min-width: 140px;">
          <label style="font-size: 0.6rem; letter-spacing: 2px; opacity: 0.6; display: block; margin-bottom: 8px;">МІСТО (НЕ ОБОВʼЯЗКОВО)</label>
          <input id="cityInput" type="text" placeholder="Київ" maxlength="50" style="width:100%;background:#030302;border:1px solid var(--border-dim);color:var(--text-light);padding:10px;font-family:'Jost',sans-serif;font-size:0.75rem;">
        </div>
      </div>
      <button id="saveBtn" class="btn-alchemy" style="width:100%;">ЗБЕРЕГТИ ТА ОТРИМАТИ ПОСИЛАННЯ</button>
      <div id="saveStatus" style="display:none; margin-top:16px;"></div>
    </div>
  </div>

</section>

<footer>M M X X V I | MAGICUM ATELIER | ART OF TRANSFORMATION</footer>

<div class="music-player" id="musicPlayer">
  <audio id="bgAudio" loop preload="none"></audio>
  <button class="music-btn" id="musicToggle" title="Фонова музика">♪</button>
  <span class="music-label">SOUNDTRACK</span>
</div>

<script src="/fabrics.js"></script>
<script>
// ═══════════════════════════════════════════════════
// 🎵 Вставте URL вашого треку зі Suno.ai:
const MUSIC_URL = '';
// ═══════════════════════════════════════════════════

const FAV_KEY  = 'magicum_favFabrics';
const HIST_KEY = 'magicum_history';
const PROF_KEY = 'magicum_profile';

let furnitureBase64 = null, furnitureMime = null;
let fabricBase64 = null, fabricMime = null, fabricName = '';
let lastGeneratedB64 = null, lastGeneratedMime = null;
let currentHistId = null;

const furnitureInput    = document.getElementById('furnitureInput');
const furniturePreview  = document.getElementById('furniturePreview');
const generateBtn       = document.getElementById('generateBtn');
const statusDiv         = document.getElementById('statusMessage');
const resultArea        = document.getElementById('resultArea');
const sourceImg         = document.getElementById('sourceImg');
const outputImg         = document.getElementById('outputImg');
const selectedFabricSpan = document.getElementById('selectedFabricLabel');

// ─── LocalStorage helpers ─────────────────────────────
function getFavs() { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); }
function setFavs(arr) { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); }

function saveToHistory(furnitureType, fabName, thumb) {
  const id = Date.now();
  const hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]');
  hist.unshift({ id, date: new Date().toISOString(), furnitureType, fabricName: fabName, thumb, caseUrl: null });
  if (hist.length > 50) hist.splice(50);
  localStorage.setItem(HIST_KEY, JSON.stringify(hist));
  return id;
}

function updateHistoryCaseUrl(id, caseUrl) {
  const hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]');
  const item = hist.find(h => h.id === id);
  if (item) { item.caseUrl = caseUrl; localStorage.setItem(HIST_KEY, JSON.stringify(hist)); }
}

// ─── Fabric grid ──────────────────────────────────────
const fabricGrid = document.getElementById('fabricGrid');
const initFavs = getFavs();
fabricPresets.forEach(preset => {
  const imgSrc = generateFabricSVG(preset);
  const isFav = initFavs.includes(preset.name);
  const div = document.createElement('div');
  div.className = 'fabric-item';
  div.dataset.name = preset.name;
  div.dataset.cat = preset.cat;
  div.innerHTML = `<img src="${imgSrc}" alt="${preset.name}"><button class="fav-btn${isFav ? ' fav-active' : ''}" title="Атлас Бажань">♥</button><span>${preset.name}</span>`;

  div.addEventListener('click', e => {
    if (e.target.classList.contains('fav-btn')) return;
    document.querySelectorAll('.fabric-item').forEach(el => el.classList.remove('active'));
    div.classList.add('active');
    fabricName = preset.name;
    selectedFabricSpan.innerText = `✓ ${preset.name}`;
    const svgStr = decodeURIComponent(imgSrc.replace('data:image/svg+xml,', ''));
    fabricBase64 = btoa(unescape(encodeURIComponent(svgStr)));
    fabricMime = 'image/svg+xml';
  });

  div.querySelector('.fav-btn').addEventListener('click', e => {
    e.stopPropagation();
    const btn = e.currentTarget;
    const favs = getFavs();
    const idx = favs.indexOf(preset.name);
    if (idx === -1) { favs.push(preset.name); btn.classList.add('fav-active'); }
    else { favs.splice(idx, 1); btn.classList.remove('fav-active'); }
    setFavs(favs);
  });

  fabricGrid.appendChild(div);
});

// ─── Fabric filters ───────────────────────────────────
document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.cat;
    document.querySelectorAll('.fabric-item').forEach(item => {
      item.style.display = (cat === 'all' || item.dataset.cat === cat) ? '' : 'none';
    });
  });
});

// ─── Furniture upload ─────────────────────────────────
furnitureInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const full = ev.target.result;
    furnitureBase64 = full.split(',')[1];
    furnitureMime = file.type;
    furniturePreview.innerHTML = `<img src="${full}">`;
    sourceImg.src = full;
  };
  reader.readAsDataURL(file);
});

// ─── Compress ─────────────────────────────────────────
function compressImage(base64, mime, maxW = 800, maxH = 600, quality = 0.8) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
      canvas.width = Math.round(img.width * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
    };
    img.onerror = () => resolve(base64);
    img.src = `data:${mime};base64,${base64}`;
  });
}

// ─── Generate ─────────────────────────────────────────
generateBtn.addEventListener('click', async () => {
  if (!furnitureBase64) { statusDiv.innerText = '❌ Завантажте фото меблів'; statusDiv.className = 'status-msg error'; return; }
  if (!fabricBase64)    { statusDiv.innerText = '❌ Оберіть тканину з каталогу'; statusDiv.className = 'status-msg error'; return; }
  generateBtn.disabled = true;
  statusDiv.innerText = '✨ Алхімія запущена...';
  statusDiv.className = 'status-msg';
  try {
    const response = await fetch('/.netlify/functions/ritual', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ furnitureBase64, furnitureMime, fabricBase64, fabricMime })
    });
    const data = await response.json();
    if (!response.ok || !data.success) throw new Error(data.error || 'Помилка');

    const resultUrl = `data:${data.mimeType || 'image/jpeg'};base64,${data.imageBase64}`;
    outputImg.src = resultUrl;
    lastGeneratedB64 = data.imageBase64;
    lastGeneratedMime = data.mimeType || 'image/jpeg';

    resultArea.style.display = 'block';
    document.getElementById('saveArea').style.display = 'block';
    document.getElementById('saveStatus').style.display = 'none';

    const prof = JSON.parse(localStorage.getItem(PROF_KEY) || '{}');
    const cityInput = document.getElementById('cityInput');
    if (prof.city && !cityInput.value) cityInput.value = prof.city;

    initSlider();

    const furnitureType = document.getElementById('furnitureTypeInput').value;
    const histThumb = await compressImage(data.imageBase64, lastGeneratedMime, 200, 150, 0.4);
    currentHistId = saveToHistory(furnitureType, fabricName, histThumb);

    statusDiv.innerText = '✅ Образ проявлено! Порівняйте оригінал і візуалізацію.';
    statusDiv.className = 'status-msg success';
  } catch (err) {
    statusDiv.innerText = `❌ Помилка: ${err.message}`;
    statusDiv.className = 'status-msg error';
  } finally { generateBtn.disabled = false; }
});

// ─── Slider ───────────────────────────────────────────
function initSlider() {
  const container = document.getElementById('sliderCompare');
  const overlay   = document.getElementById('sliderOverlay');
  const handle    = document.getElementById('sliderHandle');
  if (!container) return;
  let drag = false;
  const update = clientX => {
    const rect = container.getBoundingClientRect();
    const pct = Math.min(Math.max((clientX - rect.left) / rect.width, 0), 1) * 100;
    handle.style.left = `${pct}%`;
    overlay.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
  };
  handle.addEventListener('mousedown', () => drag = true);
  window.addEventListener('mouseup', () => drag = false);
  window.addEventListener('mousemove', e => { if (drag) update(e.clientX); });
  handle.addEventListener('touchstart', () => drag = true, { passive: true });
  window.addEventListener('touchend', () => drag = false);
  window.addEventListener('touchmove', e => { if (drag && e.touches[0]) update(e.touches[0].clientX); }, { passive: true });
  handle.style.left = '50%';
  overlay.style.clipPath = 'inset(0 50% 0 0)';
}

// ─── Save case ────────────────────────────────────────
document.getElementById('saveBtn').addEventListener('click', async () => {
  if (!lastGeneratedB64 || !furnitureBase64) return;
  const saveBtn    = document.getElementById('saveBtn');
  const saveStatus = document.getElementById('saveStatus');
  saveBtn.disabled = true;
  saveStatus.style.display = 'block';
  saveStatus.innerHTML = '<span style="opacity:0.6;font-size:0.75rem;letter-spacing:1px;">⏳ зберігаємо...</span>';
  try {
    const [beforeCompressed, afterCompressed] = await Promise.all([
      compressImage(furnitureBase64, furnitureMime),
      compressImage(lastGeneratedB64, lastGeneratedMime)
    ]);
    const furnitureType = document.getElementById('furnitureTypeInput').value;
    const city = document.getElementById('cityInput').value.trim();
    const res = await fetch('/case-save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ furnitureType, fabricName, city, beforeB64: beforeCompressed, afterB64: afterCompressed })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Помилка збереження');
    const caseUrl = window.location.origin + data.url;

    if (currentHistId) updateHistoryCaseUrl(currentHistId, caseUrl);
    if (city) {
      const prof = JSON.parse(localStorage.getItem(PROF_KEY) || '{}');
      prof.city = city;
      localStorage.setItem(PROF_KEY, JSON.stringify(prof));
    }

    saveStatus.innerHTML = `
      <div style="color:#a5d6a5;font-size:0.75rem;margin-bottom:12px;letter-spacing:1px;">✅ Кейс збережено!</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input readonly value="${caseUrl}" style="flex:1;background:#030302;border:1px solid var(--border-dim);color:var(--gold);padding:10px;font-size:0.65rem;font-family:'Jost',sans-serif;letter-spacing:1px;">
        <button onclick="navigator.clipboard.writeText('${caseUrl}')" class="btn-alchemy" style="padding:10px 16px;font-size:0.6rem;white-space:nowrap;">COPY</button>
      </div>
      <div style="margin-top:10px;display:flex;gap:20px;">
        <a href="${data.url}" target="_blank" style="color:var(--gold);font-size:0.65rem;letter-spacing:2px;">ВІДКРИТИ КЕЙС →</a>
        <a href="/cabinet" style="color:var(--gold);font-size:0.65rem;letter-spacing:2px;opacity:0.6;">КАБІНЕТ →</a>
      </div>`;
  } catch (err) {
    saveStatus.innerHTML = `<span style="color:#e0a0a0;font-size:0.75rem;">❌ ${err.message}</span>`;
    saveBtn.disabled = false;
  }
});

// ─── Cursor parallax ──────────────────────────────────
window.addEventListener('mousemove', e => {
  document.body.style.setProperty('--x', e.clientX + 'px');
  document.body.style.setProperty('--y', e.clientY + 'px');
  const bg = document.getElementById('parallaxBg');
  if (bg) bg.style.transform = `translate(${(e.clientX - window.innerWidth/2) * 0.01}px, ${(e.clientY - window.innerHeight/2) * 0.01}px) scale(1.08)`;
});

// ─── Scroll reveal ────────────────────────────────────
new IntersectionObserver(entries => entries.forEach(e => e.isIntersecting && e.target.classList.add('reveal')), { threshold: 0.2 }).observe(document.getElementById('card1'));
new IntersectionObserver(entries => entries.forEach(e => e.isIntersecting && e.target.classList.add('reveal')), { threshold: 0.2 }).observe(document.getElementById('card2'));

// ─── Music player ─────────────────────────────────────
const audio    = document.getElementById('bgAudio');
const musicBtn = document.getElementById('musicToggle');

if (MUSIC_URL) {
  audio.src = MUSIC_URL;
  musicBtn.addEventListener('click', async () => {
    if (audio.paused) {
      await audio.play().catch(() => {});
      musicBtn.innerHTML = '♫';
      musicBtn.classList.add('playing');
    } else {
      audio.pause();
      musicBtn.innerHTML = '♪';
      musicBtn.classList.remove('playing');
    }
  });
} else {
  musicBtn.classList.add('disabled');
  musicBtn.title = 'Встановіть MUSIC_URL у коді для увімкнення музики';
}
</script>
</body>
</html>
