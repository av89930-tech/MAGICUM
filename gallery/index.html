<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Галерея кейсів переобивки — MAGICUM AI Atelier</title>
  <meta name="description" content="Реальні результати AI-переобивки меблів від MAGICUM: дивани, крісла, пуфи. Нова тканина за секунди — дивіться до та після.">
  <link rel="canonical" href="https://magicum.netlify.app/gallery">
  <meta property="og:title" content="Галерея кейсів — MAGICUM AI">
  <meta property="og:description" content="Реальні результати AI-переобивки меблів. До та після — порівняйте самостійно.">
  <meta property="og:url" content="https://magicum.netlify.app/gallery">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="MAGICUM Atelier">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #C9A96E; --dark: #0A0A08; --dark-card: #0D0D0B; --border-dim: #1F1F1C; --text-light: #D1CDC7; }
    body { font-family: 'Jost', sans-serif; background: var(--dark); color: var(--text-light); min-height: 100vh; }
    nav { padding: 24px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-dim); }
    .logo { color: var(--gold); font-size: 1.2rem; letter-spacing: 10px; text-transform: uppercase; font-weight: 300; text-decoration: none; }
    .logo b { font-weight: 700; }
    .nav-link { color: var(--text-light); text-decoration: none; font-size: 0.65rem; letter-spacing: 3px; opacity: 0.5; transition: opacity .3s; }
    .nav-link:hover { opacity: 1; }
    .page-header { max-width: 1200px; margin: 0 auto; padding: 60px 20px 40px; }
    .page-header h1 { font-size: 1.6rem; font-weight: 200; letter-spacing: 8px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .page-header p { font-size: 0.65rem; letter-spacing: 3px; opacity: 0.4; }
    .filters { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; display: flex; gap: 12px; flex-wrap: wrap; }
    .filter-btn { background: transparent; border: 1px solid var(--border-dim); color: var(--text-light); padding: 8px 20px; font-size: 0.6rem; letter-spacing: 3px; cursor: pointer; transition: .3s; font-family: 'Jost', sans-serif; text-transform: uppercase; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold); }
    .grid { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .case-card { display: block; text-decoration: none; background: var(--dark-card); border: 1px solid var(--border-dim); transition: border-color .3s, transform .3s; }
    .case-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .case-thumb { overflow: hidden; background: #111; }
    .case-thumb img { width: 100%; height: auto; display: block; transition: transform .4s; }
    .case-card:hover .case-thumb img { transform: scale(1.03); }
    .case-info { padding: 16px; }
    .case-title { font-size: 0.75rem; letter-spacing: 1px; color: var(--text-light); margin-bottom: 8px; }
    .case-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .tag { font-size: 0.55rem; letter-spacing: 2px; color: var(--gold); opacity: 0.7; text-transform: uppercase; }
    .case-meta { font-size: 0.55rem; letter-spacing: 1px; opacity: 0.3; }
    .thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0.1; font-size: 2rem; }
    .load-more-wrap { text-align: center; padding: 60px 20px; }
    .btn { background: transparent; border: 1.5px solid var(--gold); color: var(--gold); padding: 14px 42px; font-size: 0.8rem; letter-spacing: 5px; cursor: pointer; transition: .4s; text-transform: uppercase; font-family: 'Jost', sans-serif; text-decoration: none; display: inline-block; }
    .btn:hover { background: var(--gold); color: var(--dark); }
    .empty-state { max-width: 500px; margin: 80px auto; text-align: center; padding: 0 20px; }
    .empty-state p { font-size: 0.65rem; letter-spacing: 3px; opacity: 0.4; margin-bottom: 32px; }
    .loading { text-align: center; padding: 80px 20px; font-size: 0.65rem; letter-spacing: 4px; opacity: 0.4; }
    footer { text-align: center; padding: 80px 20px 40px; font-size: 0.6rem; letter-spacing: 4px; opacity: 0.3; }
    @media(max-width: 860px) { .grid { grid-template-columns: repeat(2, 1fr); } nav { padding: 16px 20px; } }
    @media(max-width: 540px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">MAGIC<b>UM</b></a>
  <a href="/" class="nav-link">← НОВИЙ РИТУАЛ</a>
</nav>

<div class="page-header">
  <h1>Галерея</h1>
  <p>AI-ПЕРЕОБИВКА · РЕЗУЛЬТАТИ ДО ТА ПІСЛЯ</p>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">Всі</button>
  <button class="filter-btn" data-filter="диван">Дивани</button>
  <button class="filter-btn" data-filter="крісло">Крісла</button>
  <button class="filter-btn" data-filter="пуф">Пуфи</button>
  <button class="filter-btn" data-filter="стілець">Стільці</button>
  <button class="filter-btn" data-filter="кушетка">Кушетки</button>
</div>

<div class="grid" id="grid"></div>
<div class="loading" id="loading">завантаження...</div>
<div class="empty-state" id="emptyState" style="display:none">
  <p>ПОКИ ЩО НЕМАЄ ЗБЕРЕЖЕНИХ КЕЙСІВ</p>
  <a href="/" class="btn">СПРОБУВАТИ ПЕРШИМ</a>
</div>
<div class="load-more-wrap" id="loadMoreWrap" style="display:none">
  <button class="btn" id="loadMoreBtn">ЗАВАНТАЖИТИ ЩЕ</button>
</div>

<footer>M M X X V I | MAGICUM ATELIER | ART OF TRANSFORMATION</footer>

<script>
  let currentPage = 1;
  let currentFilter = 'all';
  let allItems = [];
  let isLoading = false;
  let totalItems = 0;
  const LIMIT = 12;

  const grid = document.getElementById('grid');
  const loading = document.getElementById('loading');
  const emptyState = document.getElementById('emptyState');
  const loadMoreWrap = document.getElementById('loadMoreWrap');
  const loadMoreBtn = document.getElementById('loadMoreBtn');

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('uk-UA', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function renderCard(item) {
    const card = document.createElement('a');
    card.className = 'case-card';
    card.href = `/case/${item.slug}`;
    card.innerHTML = `
      <div class="case-thumb">
        <img src="/case-image?slug=${item.slug}" alt="${item.title}" loading="lazy"
          onerror="this.parentElement.innerHTML='<div class=\\'thumb-placeholder\\'>✨</div>'">
      </div>
      <div class="case-info">
        <div class="case-title">${item.title}</div>
        <div class="case-tags">
          <span class="tag">${item.furnitureType}</span>
          <span class="tag">${item.fabricName}</span>
          ${item.city ? `<span class="tag">${item.city}</span>` : ''}
        </div>
        <div class="case-meta">${formatDate(item.createdAt)}</div>
      </div>`;
    return card;
  }

  function getFilteredItems() {
    if (currentFilter === 'all') return allItems;
    return allItems.filter(i => i.furnitureType === currentFilter);
  }

  function renderGrid(items, append = false) {
    if (!append) grid.innerHTML = '';
    items.forEach(item => grid.appendChild(renderCard(item)));
  }

  async function loadPage(page) {
    if (isLoading) return;
    isLoading = true;
    loading.style.display = page === 1 ? 'block' : 'none';

    try {
      const res = await fetch(`/cases-list?page=${page}&limit=${LIMIT}`);
      const data = await res.json();
      if (!data.success) throw new Error(data.error);

      totalItems = data.total;
      allItems = page === 1 ? data.items : [...allItems, ...data.items];

      const filtered = getFilteredItems();
      renderGrid(filtered, page > 1);

      loading.style.display = 'none';
      emptyState.style.display = filtered.length === 0 ? 'block' : 'none';
      loadMoreWrap.style.display = allItems.length < totalItems ? 'block' : 'none';
    } catch (err) {
      loading.style.display = 'none';
      console.error(err);
    } finally {
      isLoading = false;
    }
  }

  loadMoreBtn.addEventListener('click', () => {
    currentPage++;
    loadPage(currentPage);
  });

  document.getElementById('filters').addEventListener('click', (e) => {
    if (!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.dataset.filter;
    const filtered = getFilteredItems();
    renderGrid(filtered);
    emptyState.style.display = filtered.length === 0 ? 'block' : 'none';
  });

  loadPage(1);
</script>
</body>
</html>
